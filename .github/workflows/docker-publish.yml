name: 构建并推送 Docker 镜像

# 只手工触发。可选填目标平台；默认只构建 linux/amd64。
# 需要 ARM（如树莓派节点）时，把 platforms 填成 linux/amd64,linux/arm64
# —— 注意 arm64 走 QEMU 模拟编译 Rust，会明显变慢。
on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 目标平台（逗号分隔）
        default: linux/amd64
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # tallcode/iaxmon → ghcr.io/tallcode/iaxmon

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送到 GitHub Packages 必需
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 多平台构建需要 QEMU；单 amd64 时它是空操作，留着无妨。
      - name: 配置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 配置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Actions 自动注入，无需自建

      - name: 生成标签与标注
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
